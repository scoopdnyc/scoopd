name: DoorDash Availability Check
on:
  workflow_dispatch:

concurrency:
  group: doordash-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Run DoorDash monitor
        env:
          DD_WEB_TOKEN: ${{ secrets.DD_WEB_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: python3 lib/monitors/doordash.py
