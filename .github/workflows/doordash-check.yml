name: DoorDash Availability Check
on:
  schedule:
    - cron: '*/5 16-22 * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run DoorDash monitor
        env:
          DD_WEB_TOKEN: ${{ secrets.DD_WEB_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 lib/monitors/doordash.py
